name: Vulnerable PR Target
on:
  pull_request_target:
    types: [opened]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - run: echo "${{ secrets.MY_SECRET }}"
